<!DOCTYPE html> <html> <head> <meta charset="UTF-8"> <title>DELTARUNE BYAR</title> <link rel="stylesheet" href="style.css"> </head> <body> <h1>DELTARUNE BYAR</h1> <p>Escribe el nombre del idioma.</p> <label class="cuadroArchivo"> Nombre: <input type="text" id="idioma" placeholder="Nombre del idioma" > </label> <p>Elige el archivo del idioma.</p> <div class="cuadroArchivo"> <div class="selectorArchivo"> <span>Seleccionar archivo</span> <span id="nombreArchivo"> Ningún archivo seleccionado </span> <label class="archivoBoton"> Elegir archivo <input type="file" id="archivo" accept=".json,.zip" > </label> </div> </div> <br><br> <button class="boton" onclick="subirIdioma()"> Continuar </button> <script> function subirIdioma(){ let nombre = document.getElementById("idioma").value; let archivo = document.getElementById("archivo").files[0]; if(nombre == "" || !archivo){ alert("Falta el nombre o el archivo"); return; } let datos = new FormData(); datos.append("nombre", nombre); datos.append("archivo", archivo); fetch("http://localhost:5000/subir", { method: "POST", body: datos }) .then(res => res.text()) .then(msg => { alert(msg); }) .catch(() => { }); } </script> </body> </html>
